<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>FormBot</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    // Converts the path into a query string and redirects to the app's
    // index.html so React Router can take over and render the right route.
    // pathSegmentsToKeep = 1 because this is a project page served from
    // https://<user>.github.io/FormBot/ (not a custom domain at the root).
    var pathSegmentsToKeep = 1;

    var l = window.location;
    l.replace(
      l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
      l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
      l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
      (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
      l.hash
    );
  </script>
</head>

<body></body>

</html>
